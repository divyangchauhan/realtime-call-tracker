services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-calluser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-callpass}
      POSTGRES_DB: ${POSTGRES_DB:-calltracker}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-calluser} -d ${POSTGRES_DB:-calltracker}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  localstack:
    # Pinned to a Community release: the `latest` tag now resolves to a
    # Pro-by-default image that exits on startup unless LOCALSTACK_AUTH_TOKEN is
    # set. 3.x Community provides the S3 emulation this project needs, license-free.
    image: localstack/localstack:3.5
    restart: unless-stopped
    environment:
      SERVICES: s3
      DEFAULT_REGION: ${AWS_REGION:-us-east-1}
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  api:
    build: .
    command: node dist/main
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      REDIS_HOST: ${REDIS_HOST:-redis}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://localstack:4566}
      DB_RUN_MIGRATIONS: "true"
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      # Use wget (available on alpine) to check the /health endpoint
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-3000}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build: .
    command: node dist/worker
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      REDIS_HOST: ${REDIS_HOST:-redis}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://localstack:4566}
      DB_RUN_MIGRATIONS: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy

volumes:
  pgdata:
